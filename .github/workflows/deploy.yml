name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  BUILD_OUTPUT_DIR: .vitepress/dist
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'ai-nav' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build VitePress site
        run: npm run docs:build

      - name: Verify build output
        run: |
          test -d "${BUILD_OUTPUT_DIR}"
          ls -la "${BUILD_OUTPUT_DIR}" | sed -n '1,80p'

      - name: Install Wrangler
        run: npm install --no-save wrangler@4

      - name: Cloudflare preflight
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Target Pages project: ${CLOUDFLARE_PAGES_PROJECT_NAME}"
          npx wrangler whoami
          npx wrangler pages project list --json > pages-projects.json
          cat pages-projects.json
          jq -e --arg NAME "${CLOUDFLARE_PAGES_PROJECT_NAME}" '.[] | select(.name == $NAME)' pages-projects.json > /dev/null || {
            echo "::error::Cloudflare Pages project '${CLOUDFLARE_PAGES_PROJECT_NAME}' was not found under this account."
            echo "::error::Set GitHub repository variable CLOUDFLARE_PAGES_PROJECT_NAME to an existing Pages project name, or create one with: npx wrangler pages project create ${CLOUDFLARE_PAGES_PROJECT_NAME} --production-branch main"
            exit 1
          }

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy "${BUILD_OUTPUT_DIR}" \
            --project-name="${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch="${GITHUB_REF_NAME}"

      - name: Send deploy notification email
        if: success()
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SITE_URL: https://ai.nav.cn
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
        run: node .vitepress/scripts/send-email.js
