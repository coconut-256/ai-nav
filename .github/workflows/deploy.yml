name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  BUILD_OUTPUT_DIR: .vitepress/dist
  CLOUDFLARE_PAGES_PROJECT_NAME: ai-nav

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build VitePress site
        run: npm run docs:build

      - name: Verify build output
        run: |
          test -d "${BUILD_OUTPUT_DIR}"
          ls -la "${BUILD_OUTPUT_DIR}" | sed -n '1,80p'

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"
          command: pages deploy ${{ env.BUILD_OUTPUT_DIR }} --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Print deployment URL
        if: success()
        run: |
          echo "deployment-url=${{ steps.deploy.outputs.deployment-url }}"
          echo "pages-alias-url=${{ steps.deploy.outputs.pages-deployment-alias-url }}"

      - name: Send deploy notification email
        if: success()
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SITE_URL: https://ai.nav.cn
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
        run: node .vitepress/scripts/send-email.js
